name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - astro-refactor

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check Astro
        run: npm run check

      - name: Build site
        run: npm run build
